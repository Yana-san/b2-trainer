// ─── HELPERS ─────────────────────────────────────────────────────────────────
function tts(text,rate=0.85){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=rate;u.lang="en-US";window.speechSynthesis.speak(u);}

function useTimer(init){
  const[s,setS]=useState(init);const[on,setOn]=useState(false);const r=useRef(null);
  useEffect(()=>{if(on&&s>0)r.current=setInterval(()=>setS(p=>p-1),1000);else clearInterval(r.current);return()=>clearInterval(r.current);},[on,s]);
  const fmt=n=>`${String(Math.floor(n/60)).padStart(2,"0")}:${String(n%60).padStart(2,"0")}`;
  return{secs:s,running:on,done:s===0,start:()=>setOn(true),stop:()=>setOn(false),reset:(v=init)=>{setOn(false);setS(v);},fmt};
}
function useElapsed(){
  const[s,setS]=useState(0);const[on,setOn]=useState(false);const r=useRef(null);
  useEffect(()=>{if(on)r.current=setInterval(()=>setS(p=>p+1),1000);else clearInterval(r.current);return()=>clearInterval(r.current);},[on]);
  const fmt=n=>`${String(Math.floor(n/60)).padStart(2,"0")}:${String(n%60).padStart(2,"0")}`;
  return{secs:s,start:()=>setOn(true),stop:()=>setOn(false),reset:()=>{setOn(false);setS(0);},fmt};
}
async function blobToBase64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onloadend=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(blob);});}

// ─── JSON EXTRACTOR ──────────────────────────────────────────────────────────────
function extractJSON(raw) {
  if (!raw) throw new Error("Empty response from Gemini");
  // 1. Remove markdown code fences
  let s = raw.replace(/```json\n?/gi,'').replace(/```\n?/g,'').trim();
  // 2. Direct parse
  try { return JSON.parse(s); } catch {}
  // 3. Find the { } block
  const start = s.indexOf('{');
  if (start === -1) throw new Error("No JSON found in response");
  let depth=0, inStr=false, esc=false, end=-1;
  for (let i=start; i<s.length; i++) {
    const c=s[i];
    if (esc){esc=false;continue;}
    if (c==='\\' && inStr){esc=true;continue;}
    if (c==='"') {inStr=!inStr;continue;}
    if (!inStr){
      if (c==='{') depth++;
      else if (c==='}'){depth--;if(depth===0){end=i;break;}}
    }
  }
  // 4. If properly closed, try parsing
  if (end>-1) {
    const block = s.slice(start, end+1);
    try { return JSON.parse(block); } catch {}
    // Fix common issues
    const fixed = block
      .replace(/,\s*([}\]])/g,'$1')
      .replace(/([{,]\s*)([a-zA-Z_][\w]*)\s*:/g,'$1"$2":');
    try { return JSON.parse(fixed); } catch {}
  }
  // 5. Truncated JSON recovery — find last complete key-value before truncation
  if (start > -1) {
    let partial = s.slice(start);
    // Close unterminated string if needed
    const quoteCount = (partial.match(/(?<!\\)"/g)||[]).length;
    if (quoteCount % 2 !== 0) partial += '"';
    // Close open objects
    let d2=0;
    for (const c of partial){ if(c==='{')d2++; else if(c==='}')d2--; }
    while(d2>0){partial+='}';d2--;}
    try { return JSON.parse(partial); } catch {}
    // Last resort: extract only first complete fields
    const obj={};
    const re=/"(\w+)"\s*:\s*("(?:[^"\\]|\\.)*"|true|false|null|-?\d+(?:\.\d+)?)/g;
    let match;
    while((match=re.exec(partial))!==null){
      try{obj[match[1]]=JSON.parse(match[2]);}catch{}
    }
    if(Object.keys(obj).length>0) return obj;
  }
  throw new Error("Could not parse AI response. Please try again.");
}

// ─── GOOGLE GEMINI API ────────────────────────────────────────────────────────
// Gemini API — 複数モデルで自動フォールバック（無料ティア対応・音声入力対応）
// 優先順: gemini-2.0-flash → gemini-2.5-flash → gemini-1.5-flash-latest
const GEMINI_MODELS=["gemini-2.0-flash","gemini-2.5-flash","gemini-1.5-flash-latest"];
const GEMINI_URL=(key,model)=>`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
const GEMINI_CFG={maxOutputTokens:2500,temperature:0.3};

function notifyWait(secs){ window.dispatchEvent(new CustomEvent('gemini_wait',{detail:secs})); }
function parseWaitSecs(msg){
  const m=(msg||"").match(/retry in (\d+\.?\d*)/i);
  return m ? Math.ceil(parseFloat(m[1]))+3 : 65;
}
function isRateLimit(d){
  return d.error&&(d.error.code===429||d.error.status==="RESOURCE_EXHAUSTED"||(d.error.message||"").includes("Quota exceeded"));
}
function isOverload(d){
  return d.error&&((d.error.message||"").includes("high demand")||(d.error.message||"").includes("overloaded")||d.error.code===503);
}

// 1モデルに対してリクエスト送信（ネットワークエラーを過負荷エラーとして扱う）
async function fetchModel(apiKey,model,body){
  try{
    const r=await fetch(GEMINI_URL(apiKey,model),{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({...body,generationConfig:GEMINI_CFG}),
    });
    return r.json();
  }catch(e){
    // ネットワーク失敗→次のモデルへフォールバックさせる
    return {error:{code:503,message:"Load failed: "+e.message,status:"UNAVAILABLE"}};
  }
}

// 接続テスト — 全モデルを順番に試す（ネットワークエラーも考慮）
async function testConnection(apiKey){
  const testBody={contents:[{parts:[{text:"ok"}]}],generationConfig:{maxOutputTokens:5,temperature:0}};
  let lastErr="";
  let networkFail=0;
  for(const model of GEMINI_MODELS){
    try{
      const r=await fetch(GEMINI_URL(apiKey,model),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(testBody),
      });
      const d=await r.json();
      if(!d.error){ return model; }
      if(isRateLimit(d)) throw new Error("RATE_LIMIT");
      lastErr=d.error.message||"unknown";
    }catch(e){
      if(e.message==="RATE_LIMIT") throw e;
      // fetch自体の失敗（ネットワーク・CORS等）
      if(e.name==="TypeError"||(e.message||"").includes("Load failed")||(e.message||"").includes("fetch")){
        networkFail++;
        lastErr="NETWORK";
      } else {
        lastErr=e.message;
      }
    }
  }
  if(networkFail===GEMINI_MODELS.length) throw new Error("NETWORK_FAIL");
  throw new Error("API_FAIL: "+lastErr);
}

// 通常リクエスト — モデルフォールバック＋レート制限時自動待機
async function geminiRequest(apiKey,body,modelIdx=0,isRetry=false){
  if(modelIdx>=GEMINI_MODELS.length) throw new Error("RATE_LIMIT_FINAL");
  const d=await fetchModel(apiKey,GEMINI_MODELS[modelIdx],body);
  if(d.error){
    if(isOverload(d)){
      // 過負荷 → 次のモデルへ
      return geminiRequest(apiKey,body,modelIdx+1,false);
    }
    if(isRateLimit(d)){
      if(!isRetry){
        // レート制限 → 待機後に同モデルで再試行
        const secs=parseWaitSecs(d.error.message);
        notifyWait(secs);
        await new Promise(res=>setTimeout(res,secs*1000));
        notifyWait(0);
        return geminiRequest(apiKey,body,modelIdx,true);
      }
      // 待機後もダメ → 次のモデルへ
      return geminiRequest(apiKey,body,modelIdx+1,false);
    }
    throw new Error(d.error.message||JSON.stringify(d.error));
  }
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
}

async function callGemini(apiKey,prompt){
  return geminiRequest(apiKey,{contents:[{parts:[{text:prompt}]}]});
}
async function callGeminiAudio(apiKey,audioBlob,textPrompt){
  const b64=await blobToBase64(audioBlob);
  const mt=(audioBlob.type||"audio/mp4").split(";")[0];
  return geminiRequest(apiKey,{contents:[{parts:[{inline_data:{mime_type:mt,data:b64}},{text:textPrompt}]}]});
}

async function evalDrill(apiKey,audioBlob,liveText,target,focus){
  let raw;
  try{
    // PRIMARY: Direct audio evaluation (no transcription)
    raw=await callGeminiAudio(apiKey,audioBlob,DRILL_PROMPT(target,focus));
  }catch(e){
    // FALLBACK: Use live speech recognition transcript
    raw=await callGemini(apiKey,DRILL_PROMPT(target,focus)+`\n\nSpeech recognition transcript: "${liveText||"(none)"}"`);
  }
  return extractJSON(raw);
}

async function evalSpeech(apiKey,audioBlob,liveText,question){
  let raw;

  catch(e){

  try{ return extractJSON(raw); }

    const raw2=await callGemini(apiKey,"Return ONLY valid JSON, no markdown.\n"+SPEECH_PROMPT(question)+"\nTranscript: \""+(liveText||"")+"\"");

  }
}

// ─── AUDIO RECORDER ───────────────────────────────────────────────────────────
function useRecorder(){
  const[status,setStatus]=useState("idle");
  const[errMsg,setErrMsg]=useState("");
  const[audioBlob,setAudioBlob]=useState(null);
  const[liveText,setLiveText]=useState("");
  const mrRef=useRef(null);const streamRef=useRef(null);const chunksRef=useRef([]);
  const srRef=useRef(null);const finalRef=useRef("");const keepRef=useRef(false);

  const start=useCallback(async()=>{
    setStatus("requesting");setErrMsg("");setAudioBlob(null);setLiveText("");finalRef.current="";
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      streamRef.current=stream;
      const mimes=["audio/mp4","audio/webm;codecs=opus","audio/webm","audio/ogg"];
      const mime=mimes.find(t=>{try{return MediaRecorder.isTypeSupported(t);}catch{return false;}})||"";
      const mr=new MediaRecorder(stream,mime?{mimeType:mime}:{});
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data?.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        const type=(mime.split(";")[0])||"audio/mp4";
        setAudioBlob(new Blob(chunksRef.current,{type}));
        streamRef.current?.getTracks().forEach(t=>t.stop());
        setStatus("done");
      };
      mrRef.current=mr; mr.start(500);
      // Simultaneous speech recognition for live captions
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){
        const sr=new SR();sr.continuous=true;sr.interimResults=true;sr.lang="en-US";
        sr.onresult=e=>{let it="";for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)finalRef.current+=t+" ";else it+=t;}setLiveText(finalRef.current+(it?" "+it:""));};
        sr.onend=()=>{if(keepRef.current){try{sr.start();}catch{}}};
        sr.onerror=()=>{};
        srRef.current=sr;keepRef.current=true;try{sr.start();}catch{}
      }
      setStatus("recording");
    }catch(e){
      if(e.name==="NotAllowedError")setErrMsg("マイクの使用を許可してください。アドレスバーの🔒をタップ→マイク→許可");
      else setErrMsg("マイクエラー: "+e.message);
      setStatus("error");
    }
  },[]);

  const stop=useCallback(()=>{
    keepRef.current=false;
    try{srRef.current?.stop();}catch{}
    if(mrRef.current?.state==="recording")mrRef.current.stop();
    else{streamRef.current?.getTracks().forEach(t=>t.stop());setStatus("done");}
  },[]);

  const reset=useCallback(()=>{
    stop();setStatus("idle");setErrMsg("");setAudioBlob(null);setLiveText("");finalRef.current="";chunksRef.current=[];
  },[stop]);

  return{status,errMsg,audioBlob,liveText,start,stop,reset};
}

// ─── RECORDING UI ────────────────────────────────────────────────────────────
function RecordUI({rec,elapsed,maxSecs,minWords,onSubmit,onBack,header,showPREP}){
  const[submitting,setSubmitting]=useState(false);
  const countdown=useTimer(maxSecs||120);
  useEffect(()=>{if(rec.status==="recording"&&elapsed.secs>=maxSecs)rec.stop();},[elapsed.secs,rec.status,maxSecs]);
  const handleStart=()=>{rec.start();elapsed.start();if(maxSecs)countdown.start();};
  const handleStop=()=>{rec.stop();elapsed.stop();countdown.stop();};
  const handleSubmit=async()=>{setSubmitting(true);await onSubmit(rec);setSubmitting(false);};
  const words=(rec.liveText||"").trim().split(/\s+/).filter(Boolean).length;
  // 音声が録音されていればそのまま送信可（SafariはSpeechRecognition非対応のため語数チェックをスキップ）
  const hasAudio=!!rec.audioBlob&&elapsed.secs>=3;
  const canSubmit=rec.status==="done"&&(hasAudio||words>=minWords);

  return <div>
    {header}
    {showPREP&&<div style={{display:"flex",gap:5,justifyContent:"center",marginBottom:10}}>
      {[["P",C.gold,"結論"],["R",C.blue,"理由"],["E",C.teal,"例"],["P",C.gold,"結論"]].map(([k,c,j],i)=>
        <div key={i} style={{padding:"4px 9px",borderRadius:8,background:`${c}18`,border:`1px solid ${c}44`,textAlign:"center",minWidth:40}}>
          <div style={{fontSize:12,fontWeight:800,color:c}}>{k}</div>
          <div style={{fontSize:9,color:C.muted}}>{j}</div>
        </div>
      )}
    </div>}

    {/* Status */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"8px 14px",background:"rgba(239,68,68,0.08)",borderRadius:10,border:`1px solid ${C.err}33`}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:rec.status==="recording"?C.err:"rgba(255,255,255,0.15)",display:"inline-block",animation:rec.status==="recording"?"blink 1s ease-in-out infinite":"none"}}/>
        <span style={{fontSize:12,fontWeight:700,color:rec.status==="recording"?C.err:rec.status==="done"?C.ok:C.muted}}>
          {rec.status==="idle"&&"録音待機中"}
          {rec.status==="requesting"&&"マイク許可確認中…"}
          {rec.status==="recording"&&`🔴 録音中 ${elapsed.fmt(elapsed.secs)}`}
          {rec.status==="done"&&`✅ 録音完了（${elapsed.fmt(elapsed.secs)}）`}
          {rec.status==="error"&&"⚠️ エラー"}
        </span>
      </div>
      {rec.status==="recording"&&maxSecs&&<div style={{fontSize:12,color:countdown.secs<=20?C.err:C.muted}}>残り {countdown.fmt(countdown.secs)}</div>}
      {rec.status==="done"&&<div style={{fontSize:12,color:hasAudio?C.ok:C.warn,fontWeight:700}}>
          {hasAudio?"✅ 音声録音済み":words+"語 "+(words>=minWords?"✓":"もう少し話してください")}
        </div>}
    </div>

    {rec.errMsg&&<div style={{...S.card,background:"rgba(239,68,68,0.08)",borderColor:`${C.err}44`,fontSize:12,color:C.warn,marginBottom:10}}>{rec.errMsg}</div>}

    {/* Idle */}
    {(rec.status==="idle"||rec.status==="error")&&<div style={{textAlign:"center",marginBottom:14}}>
      <button onClick={handleStart} style={{width:90,height:90,borderRadius:"50%",background:"rgba(239,68,68,0.15)",border:`3px solid ${C.err}`,fontSize:42,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>🎙️</button>
      <div style={{fontSize:13,color:C.muted}}>ボタンを押して録音開始</div>

// ─── MORNING SCREEN ───────────────────────────────────────────────────────────
function MorningScreen({apiKey,onDone}){
  const[idx,setIdx]=useState(()=>Math.floor(Math.random()*DRILLS.length));
  const[done,setDone]=useState(0);const[correct,setCorrect]=useState(0);
  const[phase,setPhase]=useState("ready");
  const[result,setResult]=useState(null);
  const[finished,setFinished]=useState(false);
  const elapsed=useElapsed();const rec=useRecorder();
  const drill=DRILLS[idx%DRILLS.length];const total=DRILLS.length;

  const handleSubmit=async(r)=>{
    setPhase("evaluating");
    try{setResult(await evalDrill(apiKey,r.audioBlob,r.liveText,drill.en,drill.focus));}
    catch(e){setResult({focusCorrect:false,focusError:"Error: "+e.message,focusErrorJa:"エラー",overallAccuracy:0,pass:false,feedback:"Please try again.",feedbackJa:"もう一度お試しください。"});}
    setPhase("result");
  };
  const next=passed=>{
    if(passed)setCorrect(c=>c+1);const n=done+1;setDone(n);
    setPhase("ready");setResult(null);rec.reset();elapsed.reset();
    if(n>=total){setFinished(true);onDone();}else setIdx(i=>(i+1)%total);
  };

  if(finished)return <div style={{padding:"40px 16px 90px",textAlign:"center"}}><div style={{fontSize:56,marginBottom:12}}>🎉</div><div style={{...S.card,textAlign:"center"}}><div style={{fontSize:42,fontWeight:900,color:correct>=total*0.8?C.ok:C.warn}}>{correct}/{total}</div><div style={{color:C.muted,marginTop:4}}>{correct>=total*0.8?"🌟 Excellent!":"💪 Keep going!"}</div></div></div>;

  if(phase==="speaking")return <div style={{padding:"20px 16px 90px"}}>
    <RecordUI rec={rec} elapsed={elapsed} maxSecs={30} minWords={5} onBack={()=>{rec.reset();elapsed.reset();setPhase("ready");}} onSubmit={handleSubmit} showPREP={false}

        <div style={{fontSize:9,fontWeight:700,color:C.teal,letterSpacing:1,marginBottom:3}}>READ THIS SENTENCE</div>
        <div style={{fontSize:15,fontWeight:600,lineHeight:1.6,color:C.cream,marginBottom:6}}>{drill.en}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}><Pill color={C.teal}>⚡ {drill.focus}</Pill><button onClick={()=>tts(drill.en)} style={{background:C.blue,border:"none",color:"#fff",borderRadius:6,padding:"3px 9px",fontSize:10,cursor:"pointer"}}>🔊</button></div>
      </div>}
    />
  </div>;

  if(phase==="evaluating")return <div style={{padding:"80px 16px",textAlign:"center"}}><div style={{fontSize:32,display:"inline-block",animation:"spin 1.5s linear infinite",marginBottom:10}}>⏳</div><div style={{color:C.muted}}>Gemini AIが音声を評価中…</div></div>;

  if(phase==="result"&&result)return <div style={{padding:"20px 16px 90px"}}>
    <div style={{...S.card,background:"rgba(45,212,191,0.05)",borderColor:`${C.teal}33`,marginBottom:10}}>
      <div style={{fontSize:11,color:C.teal,fontWeight:700,marginBottom:3}}>TARGET</div>
      <div style={{fontSize:14,fontWeight:600}}>{drill.en}</div>
    </div>
    <div style={{...S.card,borderColor:`${result.pass?C.ok:C.warn}44`,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div><div style={{fontSize:30,fontWeight:900,color:result.pass?C.ok:C.warn}}>{result.overallAccuracy}%</div><div style={{fontSize:10,color:C.muted}}>accuracy</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:700,color:result.focusCorrect?C.ok:C.err}}>{result.focusCorrect?"✅":"❌"} {drill.focus}</div></div>
      </div>
      {result.focusError&&<div style={{padding:"8px 12px",background:"rgba(239,68,68,0.08)",borderRadius:8,borderLeft:`3px solid ${C.err}`,marginBottom:8}}><div style={{fontSize:12,color:C.err}}>{result.focusError}</div>{result.focusErrorJa&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{result.focusErrorJa}</div>}</div>}
      <div style={{fontSize:13,color:result.pass?C.ok:C.muted}}>{result.feedback}</div>
      {result.feedbackJa&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>{result.feedbackJa}</div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <button onClick={()=>{rec.reset();elapsed.reset();setPhase("speaking");setResult(null);}} style={{...S.btn("rgba(239,68,68,0.12)",C.err,14),...{border:`1px solid ${C.err}44`,borderRadius:10,padding:"13px 0"}}}>🔄 もう一度</button>
      <button onClick={()=>next(result.pass)} style={{...S.btn(result.pass?C.ok:C.warn,"#111",14),...{borderRadius:10,padding:"13px 0"}}}>{result.pass?"✓ 次へ":"→ スキップ"}</button>
    </div>
  </div>;

  return <div style={{padding:"20px 16px 90px"}}>
    <div style={S.lbl}>🌅 ACCURACY DRILL — {done}/{total}</div>
    <div style={{...S.card,padding:"18px",marginBottom:14}}>
      <div style={{fontSize:11,color:C.muted,marginBottom:6}}>READ ALOUD</div>

  </div>;

    setPhase("feedback");if(count+1>=3)onDone();setCount(c=>c+1);
  };
  const reset=()=>{setPhase("select");setFeedback(null);setQuestion("");setQuestionJa("");rec.reset();elapsed.reset();speakTimer.reset();};

  if(phase==="select")return <div style={{padding:"20px 16px 90px"}}>
    <div style={S.lbl}>🧠 PREP SPEAKING</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {TOPICS.filter(t=>selectedTopics.includes(t.id)).map(t=><button key={t.id} onClick={()=>genQ(t.id)} style={{...S.card,cursor:"pointer",textAlign:"center",padding:"16px 10px",margin:0}}>
        <div style={{fontSize:28,marginBottom:6}}>{t.e}</div><div style={{fontSize:13,fontWeight:600}}>{t.n}</div><div style={{fontSize:11,color:C.muted,marginTop:2}}>{t.j}</div>
      </button>)}
      <button onClick={()=>genQ(selectedTopics[Math.floor(Math.random()*selectedTopics.length)])} style={{...S.card,cursor:"pointer",textAlign:"center",padding:"16px 10px",margin:0,border:`1px solid ${C.gold}44`,background:"rgba(201,168,76,0.06)"}}>
        <div style={{fontSize:28,marginBottom:6}}>🎲</div><div style={{fontSize:13,fontWeight:600,color:C.goldL}}>Random</div>
      </button>
    </div>
  </div>;

  if(phase==="loadQ"||phase==="evaluating")return <div style={{padding:"80px 16px",textAlign:"center"}}><div style={{fontSize:44,display:"inline-block",animation:"spin 1.5s linear infinite",marginBottom:16}}>⏳</div><div style={{color:C.muted}}>{phase==="loadQ"?"質問を生成中…":"Gemini AIが音声を評価中…"}</div></div>;

  if(phase==="question")return <div style={{padding:"20px 16px 90px"}}>
    <div style={{...S.card,padding:"20px 18px",marginBottom:12}}>
      <div style={S.lbl}>QUESTION</div>
      <div style={{fontSize:16,fontWeight:600,lineHeight:1.8,marginBottom:12}}>{question}</div>
      <button onClick={()=>tts(question)} style={{...S.btn(C.blue,"#fff",13)}}>🔊 聞く</button>
      <div style={{fontSize:13,color:C.muted,borderTop:`1px solid ${C.border}`,marginTop:12,paddingTop:12,lineHeight:1.6}}>{questionJa}</div>
    </div>
    <div style={{...S.card,background:"rgba(201,168,76,0.05)",borderColor:`${C.gold}33`,marginBottom:14,fontSize:12,color:C.muted}}>
      <strong style={{color:C.gold}}>PREP: </strong>P（結論）→ R（理由）→ E（具体例）→ P（結論）<br/>
      <span style={{color:C.cream}}>I believe…</span> / Because… / Additionally… / Therefore…
    </div>
    <button onClick={()=>{rec.reset();elapsed.reset();setPhase("speaking");}} style={{...S.btn(C.gold,"#111"),width:"100%",padding:15,borderRadius:10,fontSize:15}}>🎙️ 話す → AI評価（2分）</button>
  </div>;

  if(phase==="speaking")return <div style={{padding:"20px 16px 90px"}}>
    <div style={{position:"sticky",top:0,background:C.bg,paddingBottom:10,zIndex:10}}>
      <div style={{fontSize:10,fontWeight:700,color:C.blue,marginBottom:3}}>QUESTION</div>
      <div style={{fontSize:13,fontWeight:600,lineHeight:1.5,color:C.cream,marginBottom:6}}>{question}</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:4}}>
          {[["P",C.gold],["R",C.blue],["E",C.teal],["P",C.gold]].map(([k,c],i)=><div key={i} style={{padding:"3px 8px",borderRadius:6,background:`${c}18`,border:`1px solid ${c}44`,fontSize:11,fontWeight:800,color:c}}>{k}</div>)}
        </div>
        <div style={{fontSize:20,fontWeight:900,color:speakTimer.secs<=20?C.err:C.gold}}>{speakTimer.fmt(speakTimer.secs)}</div>
      </div>
    </div>
    <RecordUI rec={rec} elapsed={elapsed} maxSecs={120} minWords={25} onBack={()=>{rec.reset();elapsed.reset();speakTimer.reset();setPhase("question");}} onSubmit={handleSubmit} showPREP={false} header={null}/>
  </div>;

  if(phase==="feedback")return <EvalCard feedback={feedback} onNext={reset} nextLabel={`➕ 次の問題へ${count>=3?" 🎉":""}`}/>;
  return null;
}

// ─── SIMULATION SCREEN ───────────────────────────────────────────────────────
function SimScreen({apiKey,selectedTopics,onDone}){
  const[phase,setPhase]=useState("intro");
  const[question,setQuestion]=useState("");const[questionJa,setQuestionJa]=useState("");
  const[feedback,setFeedback]=useState(null);
  const prepTimer=useTimer(30);const speakTimer=useTimer(120);
  const elapsed=useElapsed();const rec=useRecorder();
  useEffect(()=>{if(phase==="prep"&&prepTimer.done)setPhase("speaking");},[prepTimer.done,phase]);

  const genQ=async()=>{
    setPhase("loadQ");
    const ids=selectedTopics.length?selectedTopics:["business"];
    const tid=ids[Math.floor(Math.random()*ids.length)];
    const t=TOPICS.find(x=>x.id===tid)||TOPICS[0];
    try{const p=await generateQuestion(apiKey,t.n);setQuestion(p.en||"");setQuestionJa(p.ja||"");}
    catch{setQuestion("What do you think is the most important skill for professionals over the next ten years, and why?");setQuestionJa("今後10年間で専門家が最も身につけるべきスキルは何だと思いますか？");}
    setPhase("prep");prepTimer.reset(30);
  };

  const handleSubmit=async(r)=>{
    setPhase("evaluating");
    try{setFeedback(await evalSpeech(apiKey,r.audioBlob,r.liveText,question));}
    catch(e){setFeedback({overallLevel:"B1",interaction:{score:"B1",evidence:"(error)",comment:"Error: "+e.message,commentJa:"エラー"},coherence:{score:"B1",prepUsed:false,connectors:[],comment:"",commentJa:""},accuracy:{score:"B1",comment:"",commentJa:"",corrections:[]},modelAnswer:"",tip:"Try again.",tipJa:""});}
    setPhase("done");onDone();
  };
  const reset=()=>{setPhase("intro");setFeedback(null);setQuestion("");setQuestionJa("");rec.reset();elapsed.reset();prepTimer.reset();speakTimer.reset();};

  if(phase==="intro")return <div style={{padding:"24px 16px 90px"}}>
    <div style={{fontSize:18,fontWeight:600,marginBottom:14}}>🎙️ PROGOS模擬試験</div>
    <div style={{...S.card,marginBottom:12}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,textAlign:"center"}}>
        {[{t:"準備",s:"30秒",c:C.gold},{t:"話す",s:"2分",c:C.err},{t:"AI採点",s:"即時",c:C.teal}].map(x=><div key={x.t} style={{padding:"12px 4px",background:"rgba(255,255,255,0.03)",borderRadius:10}}><div style={{fontSize:10,color:x.c,fontWeight:700,marginBottom:3}}>{x.t}</div><div style={{fontSize:15,fontWeight:800}}>{x.s}</div></div>)}
      </div>
    </div>
    <div style={{...S.card,background:"rgba(239,68,68,0.05)",borderColor:`${C.err}33`,fontSize:13,color:C.muted,lineHeight:1.7,marginBottom:16}}>
      🎯 <strong>Interaction（最重要）</strong>：冒頭の一文で直接答える<br/>
      Why→Because / What→The most important / How→By doing
    </div>
    <button onClick={genQ} style={{...S.btn(C.gold,"#111"),width:"100%",padding:15,borderRadius:10,fontSize:15}}>🎯 問題を生成してスタート</button>
  </div>;

  if(phase==="loadQ"||phase==="evaluating")return <div style={{padding:"80px 16px",textAlign:"center"}}><div style={{fontSize:44,display:"inline-block",animation:"spin 1.5s linear infinite",marginBottom:16}}>⏳</div><div style={{color:C.muted}}>{phase==="loadQ"?"問題を生成中…":"Gemini AIが音声を評価中…"}</div></div>;

  if(phase==="prep")return <div style={{padding:"24px 16px 90px",textAlign:"center"}}>
    <div style={S.lbl}>🟡 PREPARATION TIME</div>
    <div style={{fontSize:64,fontWeight:900,color:prepTimer.secs<=10?C.err:C.gold,fontVariantNumeric:"tabular-nums",margin:"12px 0 8px",lineHeight:1}}>{prepTimer.fmt(prepTimer.secs)}</div>
    <div style={{...S.card,textAlign:"left",marginBottom:12}}>
      <div style={{fontSize:15,fontWeight:600,lineHeight:1.8,marginBottom:8}}>{question}</div>
      <div style={{fontSize:13,color:C.muted,lineHeight:1.6,marginBottom:10}}>{questionJa}</div>
      <button onClick={()=>tts(question)} style={{...S.btn(C.blue,"#fff",12)}}>🔊 聞く</button>
    </div>
    {!prepTimer.running&&<button onClick={prepTimer.start} style={{...S.btn(C.gold,"#111"),width:"100%",padding:14,borderRadius:10,marginBottom:10}}>▶ タイマースタート</button>}
    <button onClick={()=>{rec.reset();elapsed.reset();setPhase("speaking");}} style={{...S.ghost,width:"100%",padding:12}}>✓ 準備完了 → 今すぐ話す</button>
  </div>;

  if(phase==="speaking")return <div style={{padding:"20px 16px 90px"}}>
    <div style={{position:"sticky",top:0,background:C.bg,paddingBottom:10,zIndex:10}}>
      <div style={{fontSize:10,fontWeight:700,color:C.err,marginBottom:3}}>QUESTION</div>
      <div style={{fontSize:13,fontWeight:600,lineHeight:1.5,color:C.cream,marginBottom:3}}>{question}</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:6}}>{questionJa}</div>
      <div style={{fontSize:22,fontWeight:900,color:speakTimer.secs<=20?C.err:C.gold}}>{speakTimer.fmt(speakTimer.secs)}</div>
    </div>
    <RecordUI rec={rec} elapsed={elapsed} maxSecs={120} minWords={35} onBack={()=>{rec.reset();elapsed.reset();speakTimer.reset();setPhase("prep");}} onSubmit={handleSubmit} showPREP={false} header={null}/>
  </div>;

  if(phase==="done")return <EvalCard feedback={feedback} onNext={reset} nextLabel="🔄 もう一問練習する"/>;
  return null;
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function SettingsScreen({onClearKey,selectedTopics,setSelectedTopics}){
  return <div style={{padding:"24px 16px 90px"}}>
    <div style={S.lbl}>⚙️ SETTINGS 設定</div>
    <div style={S.card}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>トピック選択</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {TOPICS.map(t=>{const on=selectedTopics.includes(t.id);return <button key={t.id} onClick={()=>{const n=on&&selectedTopics.length>1?selectedTopics.filter(x=>x!==t.id):[...selectedTopics.filter(x=>x!==t.id),t.id];setSelectedTopics(n);}} style={{padding:"6px 14px",borderRadius:20,fontSize:13,fontWeight:500,cursor:"pointer",border:`1px solid ${on?C.gold:C.border}`,background:on?"rgba(201,168,76,0.18)":"transparent",color:on?C.goldL:C.muted}}>{t.e} {t.j}</button>;})}
      </div>
    </div>
    <div style={{...S.card,marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Gemini APIキー</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:10}}>キーを変更する場合はリセットしてください</div>
      <button onClick={onClearKey} style={{...S.ghost,fontSize:12,padding:"8px 14px"}}>🔑 APIキーをリセット</button>
    </div>
    <div style={{...S.card,background:"rgba(68,136,255,0.06)",borderColor:`${C.blue}33`,fontSize:12,color:C.muted,lineHeight:1.7}}>
      <strong style={{color:C.blue}}>Gemini API 無料ティア</strong><br/>
      • Gemini 2.5 Flash: 1日250リクエスト<br/>
      • クレジットカード不要・有効期限なし<br/>
      • 1回の練習セッション ≈ 1〜3リクエスト<br/>
      • 1日の練習に十分な量
    </div>
  </div>;
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("b2_gemini_key")||"");
  const[screen,setScreen]=useState("home");
  const[selectedTopics,setSelectedTopics]=useState(["pharma","ai","business"]);
  const[todayDone,setTodayDone]=useState({morning:false,prep:false,sim:false});
  const[waitSecs,setWaitSecs]=useState(0);
  const[countdown,setCountdown]=useState(0);

  // Listen for rate limit events from Gemini API calls
  useEffect(()=>{
    const handler=e=>{
      const s=e.detail;
      setWaitSecs(s);
      setCountdown(s);
    };
    window.addEventListener('gemini_wait',handler);
    return()=>window.removeEventListener('gemini_wait',handler);
  },[]);

  // Countdown timer
  useEffect(()=>{
    if(countdown<=0)return;
    const t=setInterval(()=>setCountdown(c=>Math.max(0,c-1)),1000);
    return()=>clearInterval(t);
  },[countdown]);

  const saveKey=k=>{localStorage.setItem("b2_gemini_key",k);setApiKey(k);};
  const clearKey=()=>{localStorage.removeItem("b2_gemini_key");setApiKey("");};
  const markDone=k=>setTodayDone(p=>({...p,[k]:true}));

  if(!apiKey)return <SetupScreen onSave={saveKey}/>;
  return <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.bg} 0%,#0b1726 100%)`,color:C.cream}}>
    {/* Rate limit banner */}
    {countdown>0&&<div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,background:"rgba(245,158,11,0.95)",padding:"12px 16px",textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.5)"}}>
      <div style={{fontSize:14,fontWeight:800,color:"#111",marginBottom:2}}>
        ⏳ {countdown}秒後に自動で再開します — そのままお待ちください
      </div>
      <div style={{fontSize:11,color:"rgba(0,0,0,0.65)"}}>
        API使用上限（無料: 15回/分）に達しました。待機後に自動再試行します。
      </div>
    </div>}
    {screen==="home"    &&<HomeScreen setScreen={setScreen} todayDone={todayDone}/>}
    {screen==="morning" &&<MorningScreen apiKey={apiKey} onDone={()=>markDone("morning")}/>}
    {screen==="prep"    &&<PrepScreen apiKey={apiKey} selectedTopics={selectedTopics} onDone={()=>markDone("prep")}/>}
    {screen==="sim"     &&<SimScreen apiKey={apiKey} selectedTopics={selectedTopics} onDone={()=>markDone("sim")}/>}
    {screen==="settings"&&<SettingsScreen onClearKey={clearKey} selectedTopics={selectedTopics} setSelectedTopics={setSelectedTopics}/>}
    <NavBar screen={screen} setScreen={setScreen}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
